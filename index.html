<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WOD Notepad – World of Discoveries</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* ————————————————————————————————
   GLOBAL STYLES
———————————————————————————————— */
:root {
  --bg: #050608;
  --bg-alt: #101218;
  --card: #151822;
  --accent: #f5c451;
  --accent-soft: rgba(245,196,81,0.15);
  --text-main: #f7f7f7;
  --text-muted: #9ca3af;
  --danger: #f97373;
  --border: #262938;
  --radius-lg: 18px;
  --radius-md: 12px;
  --radius-sm: 8px;
  --shadow-soft: 0 18px 40px rgba(0,0,0,0.6);
  --transition-fast: 0.18s ease-out;
  --font-main: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
    "Segoe UI", sans-serif;
}

body {
  margin: 0;
  padding: 0;
  background: #050608;
  color: var(--text-main);
  font-family: var(--font-main);
  overflow: hidden;
}

/* ————————————————————————————————
   MAIN SCREENS
———————————————————————————————— */
.screen {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  background: #050608;
  transition: transform 0.25s ease-out;
}

#homeScreen {
  transform: translateX(0);
}

#editorScreen {
  transform: translateX(100%);
  background: #050608;
  padding: 14px;
}

/* Slide in */
.screen.show {
  transform: translateX(0);
}

/* ————————————————————————————————
   TOP BAR
———————————————————————————————— */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px;
}

.brand-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}

.brand-dot {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: var(--accent);
  box-shadow: 0 0 12px rgba(245,196,81,0.9);
}

.brand-subtitle {
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.icon-btn {
  width: 32px;
  height: 32px;
  border-radius: 999px;
  border: 1px solid rgba(148,163,184,0.3);
  background: #0b0d14;
  color: var(--text-main);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ————————————————————————————————
   SEARCH BAR
———————————————————————————————— */
.search-box {
  margin: 0 14px;
  display: flex;
  align-items: center;
  background: #0b0d14;
  border-radius: 999px;
  border: 1px solid var(--border);
  padding: 8px 12px;
}

.search-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-main);
}

/* ————————————————————————————————
   STATS
———————————————————————————————— */
.stats-row {
  display: flex;
  gap: 8px;
  padding: 14px;
}

.stat-pill {
  flex: 1;
  background: #0b0d14;
  border-radius: 999px;
  border: 1px solid var(--border);
  padding: 8px;
  text-align: center;
}

.stat-label {
  font-size: 10px;
  color: var(--text-muted);
}

.stat-value {
  font-size: 14px;
  color: var(--accent);
  font-weight: 600;
}

/* ————————————————————————————————
   CATEGORY TABS
———————————————————————————————— */
.tabs {
  display: flex;
  gap: 6px;
  padding: 0 14px;
}

.tab-chip {
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-muted);
}

.tab-chip.active {
  background: var(--accent);
  color: #020617;
  font-weight: 600;
}

/* ————————————————————————————————
   NOTES LIST
———————————————————————————————— */
.notes-list {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.note-card {
  background: #0b0d14;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  padding: 12px;
}

.note-title {
  font-size: 14px;
  font-weight: 600;
}

.note-body {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ————————————————————————————————
   FLOATING BUTTON
———————————————————————————————— */
.fab {
  position: absolute;
  right: 18px;
  bottom: 24px;
  width: 56px;
  height: 56px;
  border-radius: 999px;
  background: var(--accent);
  color: #020617;
  font-size: 28px;
  border: none;
}

/* ————————————————————————————————
   EDITOR SCREEN
———————————————————————————————— */
.back-btn {
  font-size: 16px;
  padding: 8px 0;
  color: var(--accent);
}

.editor-field {
  margin-top: 14px;
}

.editor-input,
.editor-textarea,
.editor-select {
  width: 100%;
  background: #0b0d14;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px;
  color: var(--text-main);
}

.editor-textarea {
  min-height: 150px;
}

.save-btn {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-md);
  color: #020617;
  font-weight: 700;
}
</style>
</head>

<body>

<!-- ————————————————————————————————
     HOME SCREEN
———————————————————————————————— -->
<div id="homeScreen" class="screen">

  <div class="top-bar">
    <div>
      <div class="brand-title">
        <span class="brand-dot"></span>
        WOD Notepad
      </div>
      <div class="brand-subtitle">WORLD OF DISCOVERIES</div>
    </div>
  </div>

  <div class="search-box">
    <input id="searchInput" class="search-input" placeholder="Search notes..." />
  </div>

  <div class="stats-row">
    <div class="stat-pill"><div class="stat-label">Notes</div><div id="statNotes" class="stat-value">0</div></div>
    <div class="stat-pill"><div class="stat-label">Pinned</div><div id="statPinned" class="stat-value">0</div></div>
    <div class="stat-pill"><div class="stat-label">Words</div><div id="statWords" class="stat-value">0</div></div>
    <div class="stat-pill"><div class="stat-label">Today</div><div id="statToday" class="stat-value">0</div></div>
  </div>

  <div class="tabs">
    <button class="tab-chip active" data-tab="all">All</button>
    <button class="tab-chip" data-tab="Personal">Personal</button>
    <button class="tab-chip" data-tab="Work">Work</button>
    <button class="tab-chip" data-tab="Ideas">Ideas</button>
    <button class="tab-chip" data-tab="To-Do">To-Do</button>
  </div>

  <div id="notesList" class="notes-list"></div>

  <button id="fab" class="fab">+</button>
</div>

<!-- ————————————————————————————————
     EDITOR SCREEN
———————————————————————————————— -->
<div id="editorScreen" class="screen">

  <div id="backBtn" class="back-btn">← Back</div>

  <div class="editor-field">
    <input id="editorTitle" class="editor-input" placeholder="Title..." />
  </div>

  <div class="editor-field">
    <select id="editorCategory" class="editor-select">
      <option value="Personal">Personal</option>
      <option value="Work">Work</option>
      <option value="Ideas">Ideas</option>
      <option value="To-Do">To-Do</option>
    </select>
  </div>

  <div class="editor-field">
    <textarea id="editorBody" class="editor-textarea" placeholder="Type your note..."></textarea>
  </div>

  <button id="saveBtn" class="save-btn">Save</button>
</div>

<script>
/* ————————————————————————————————
   FIREBASE REST CONFIG
———————————————————————————————— */
const DB = "https://let-s-talk-e57c6-default-rtdb.firebaseio.com/notes";

/* ————————————————————————————————
   STATE
———————————————————————————————— */
let notes = [];
let editingId = null;

/* ————————————————————————————————
   ELEMENTS
———————————————————————————————— */
const homeScreen = document.getElementById("homeScreen");
const editorScreen = document.getElementById("editorScreen");
const notesList = document.getElementById("notesList");
const fab = document.getElementById("fab");
const backBtn = document.getElementById("backBtn");
const saveBtn = document.getElementById("saveBtn");

const editorTitle = document.getElementById("editorTitle");
const editorCategory = document.getElementById("editorCategory");
const editorBody = document.getElementById("editorBody");

/* ————————————————————————————————
   LOAD NOTES
———————————————————————————————— */
async function loadNotes() {
  const res = await fetch(DB + ".json");
  const data = await res.json();
  notes = [];

  if (data) {
    for (const [id, n] of Object.entries(data)) {
      notes.push({ id, ...n });
    }
  }

  renderNotes();
}

function renderNotes() {
  notesList.innerHTML = "";

  notes.forEach(n => {
    const card = document.createElement("div");
    card.className = "note-card";
    card.innerHTML = `
      <div class="note-title">${n.title || "Untitled"}</div>
      <div class="note-body">${n.body.slice(0, 80)}...</div>
    `;
    card.onclick = () => openEditor(n);
    notesList.appendChild(card);
  });
}

/* ————————————————————————————————
   OPEN EDITOR
———————————————————————————————— */
function openEditor(note) {
  if (note) {
    editingId = note.id;
    editorTitle.value = note.title;
    editorCategory.value = note.category;
    editorBody.value = note.body;
  } else {
    editingId = null;
    editorTitle.value = "";
    editorCategory.value = "Personal";
    editorBody.value = "";
  }

  homeScreen.classList.remove("show");
  editorScreen.classList.add("show");
}

/* ————————————————————————————————
   SAVE NOTE
———————————————————————————————— */
async function saveNote() {
  const note = {
    title: editorTitle.value,
    category: editorCategory.value,
    body: editorBody.value,
    createdAt: Date.now()
  };

  if (editingId) {
    await fetch(`${DB}/${editingId}.json`, {
      method: "PATCH",
      body: JSON.stringify(note)
    });
  } else {
    await fetch(DB + ".json", {
      method: "POST",
      body: JSON.stringify(note)
    });
  }

  closeEditor();
  loadNotes();
}

/* ————————————————————————————————
   CLOSE EDITOR
———————————————————————————————— */
function closeEditor() {
  editorScreen.classList.remove("show");
  homeScreen.classList.add("show");
}

/* ————————————————————————————————
   EVENTS
———————————————————————————————— */
fab.onclick = () => openEditor(null);
backBtn.onclick = closeEditor;
saveBtn.onclick = saveNote;

/* ————————————————————————————————
   INIT
———————————————————————————————— */
loadNotes();
</script>

</body>
</html>
