<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WOD Notepad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020204;
      color: #f9fafb;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }
    .app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      background: #020204;
      display: flex;
      flex-direction: column;
    }
    .screen {
      flex: 1;
      display: none;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      background: #020204;
    }
    .screen.active {
      display: flex;
    }
    h1, h2, h3 {
      margin: 0 0 8px;
    }
    .card {
      background: #050509;
      border: 1px solid #1f2933;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      margin-bottom: 10px;
    }
    .field label {
      font-size: 13px;
      margin-bottom: 4px;
      color: #9ca3af;
    }
    .field input,
    .field textarea {
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: #f9fafb;
      padding: 8px;
      font-size: 14px;
      outline: none;
    }
    .field textarea {
      min-height: 120px;
      resize: vertical;
    }
    .btn {
      border-radius: 999px;
      border: 1px solid #f5c451;
      background: #f5c451;
      color: #020204;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn.secondary {
      background: transparent;
      color: #f9fafb;
      border-color: #4b5563;
    }
    .btn.danger {
      background: transparent;
      color: #fecaca;
      border-color: #f97373;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .row.space-between {
      justify-content: space-between;
    }
    .error {
      color: #fecaca;
      font-size: 12px;
      min-height: 16px;
      margin-top: 4px;
    }
    .note-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }
    .note-item {
      background: #050509;
      border-radius: 10px;
      border: 1px solid #374151;
      padding: 10px;
      cursor: pointer;
    }
    .note-item-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .note-item-meta {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    .note-item-body {
      font-size: 13px;
      color: #e5e7eb;
      max-height: 48px;
      overflow: hidden;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .top-title {
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 16px;
    }
    .pill {
      border-radius: 999px;
      border: 1px solid #4b5563;
      padding: 4px 10px;
      font-size: 11px;
      color: #9ca3af;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      background: #020617;
      color: #f9fafb;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid #374151;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease-out, transform 0.2s ease-out;
      z-index: 50;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- LOGIN -->
    <div id="screen-login" class="screen active">
      <div class="card">
        <h2>Login</h2>
        <div class="field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" autocomplete="email" />
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" autocomplete="current-password" />
        </div>
        <div class="error" id="loginError"></div>
        <button class="btn" id="loginBtn">Login</button>
        <button class="btn secondary" id="goSignup">Create account</button>
      </div>
    </div>

    <!-- SIGNUP -->
    <div id="screen-signup" class="screen">
      <div class="card">
        <h2>Sign up</h2>
        <div class="field">
          <label for="signupEmail">Email</label>
          <input id="signupEmail" type="email" autocomplete="email" />
        </div>
        <div class="field">
          <label for="signupPassword">Password</label>
          <input id="signupPassword" type="password" autocomplete="new-password" />
        </div>
        <div class="field">
          <label for="signupPassword2">Confirm password</label>
          <input id="signupPassword2" type="password" autocomplete="new-password" />
        </div>
        <div class="error" id="signupError"></div>
        <button class="btn" id="signupBtn">Create account</button>
        <button class="btn secondary" id="goLogin">Back to login</button>
      </div>
    </div>

    <!-- PIN LOCK -->
    <div id="screen-lock" class="screen">
      <div class="card">
        <h2>WOD Notepad</h2>
        <p>Enter your 4‑digit PIN to unlock your vault.</p>
        <div class="field">
          <label for="lockPinInput">PIN</label>
          <input
            id="lockPinInput"
            type="password"
            maxlength="4"
            inputmode="numeric"
            autocomplete="off"
          />
        </div>
        <div class="error" id="lockError"></div>
        <button class="btn" id="lockUnlockBtn">Unlock</button>
      </div>
    </div>

    <!-- HOME / NOTES LIST -->
    <div id="screen-home" class="screen">
      <div class="top-bar">
        <div>
          <div class="top-title">WOD Notepad</div>
          <div style="font-size:11px;color:#9ca3af;">World of Discoveries</div>
        </div>
        <div class="row">
          <button class="btn secondary" id="settingsBtn">Settings</button>
          <button class="btn secondary" id="logoutBtn">Logout</button>
        </div>
      </div>

      <div class="card">
        <div class="row space-between">
          <div class="pill" id="statsNotes">Notes: 0</div>
          <div class="pill" id="statsWords">Words: 0</div>
        </div>
      </div>

      <div class="card">
        <div class="row space-between">
          <h3>Notes</h3>
          <button class="btn" id="newNoteBtn">+ New</button>
        </div>
        <div class="note-list" id="notesList"></div>
        <div id="notesEmpty" style="font-size:13px;color:#9ca3af;margin-top:8px;">
          No notes yet. Tap “New”.
        </div>
      </div>
    </div>

    <!-- EDITOR -->
    <div id="screen-editor" class="screen">
      <div class="card">
        <div class="row space-between">
          <h3 id="editorTitle">New note</h3>
          <button class="btn secondary" id="editorBackBtn">Back</button>
        </div>
        <div class="field">
          <label for="noteTitleInput">Title</label>
          <input id="noteTitleInput" type="text" />
        </div>
        <div class="field">
          <label for="noteBodyInput">Note</label>
          <textarea id="noteBodyInput"></textarea>
        </div>
        <div class="row space-between">
          <button class="btn" id="editorSaveBtn">Save</button>
          <button class="btn danger" id="editorDeleteBtn">Delete</button>
        </div>
        <div style="font-size:12px;color:#9ca3af;margin-top:6px;" id="editorStatus">
          Ready
        </div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="screen-settings" class="screen">
      <div class="card">
        <div class="row space-between">
          <h3>Settings</h3>
          <button class="btn secondary" id="settingsBackBtn">Back</button>
        </div>
        <div class="field">
          <label for="settingsPinInput">4‑digit PIN (optional)</label>
          <input
            id="settingsPinInput"
            type="password"
            maxlength="4"
            inputmode="numeric"
            autocomplete="off"
          />
          <div style="font-size:12px;color:#9ca3af;margin-top:4px;">
            Set a 4‑digit PIN to lock your notes. Leave empty to remove lock.
          </div>
        </div>
        <button class="btn" id="settingsSavePinBtn">Save PIN</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // --- Firebase config (your config) ---
    const firebaseConfig = {
      apiKey: "AIzaSyBMKrFDt5uvRDjTDDeaRKQQHXNrwc0SAEo",
      authDomain: "let-s-talk-e57c6.firebaseapp.com",
      databaseURL: "https://let-s-talk-e57c6-default-rtdb.firebaseio.com",
      projectId: "let-s-talk-e57c6",
      storageBucket: "let-s-talk-e57c6.firebasestorage.app",
      messagingSenderId: "958080107908",
      appId: "1:958080107908:web:d9b11b958af59bb315c9d1",
      measurementId: "G-QG6K3BNH6G"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // --- State ---
    let currentUID = null;
    let notes = [];
    let editingNoteId = null;
    let pinLoaded = false;
    let hasPin = false;
    let sessionUnlocked = false;
    let notesRef = null;

    // --- DOM helpers ---
    const screens = {
      login: document.getElementById("screen-login"),
      signup: document.getElementById("screen-signup"),
      lock: document.getElementById("screen-lock"),
      home: document.getElementById("screen-home"),
      editor: document.getElementById("screen-editor"),
      settings: document.getElementById("screen-settings"),
    };
    let currentScreen = "login";

    function showScreen(name) {
      Object.values(screens).forEach((s) => s.classList.remove("active"));
      screens[name].classList.add("active");
      currentScreen = name;
    }

    const toastEl = document.getElementById("toast");
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 1800);
    }

    // --- Elements ---
    const loginEmailEl = document.getElementById("loginEmail");
    const loginPasswordEl = document.getElementById("loginPassword");
    const loginBtnEl = document.getElementById("loginBtn");
    const loginErrorEl = document.getElementById("loginError");
    const goSignupEl = document.getElementById("goSignup");

    const signupEmailEl = document.getElementById("signupEmail");
    const signupPasswordEl = document.getElementById("signupPassword");
    const signupPassword2El = document.getElementById("signupPassword2");
    const signupBtnEl = document.getElementById("signupBtn");
    const signupErrorEl = document.getElementById("signupError");
    const goLoginEl = document.getElementById("goLogin");

    const lockPinInput = document.getElementById("lockPinInput");
    const lockUnlockBtn = document.getElementById("lockUnlockBtn");
    const lockErrorEl = document.getElementById("lockError");

    const settingsBtnEl = document.getElementById("settingsBtn");
    const logoutBtnEl = document.getElementById("logoutBtn");
    const newNoteBtnEl = document.getElementById("newNoteBtn");
    const notesListEl = document.getElementById("notesList");
    const notesEmptyEl = document.getElementById("notesEmpty");
    const statsNotesEl = document.getElementById("statsNotes");
    const statsWordsEl = document.getElementById("statsWords");

    const editorTitleEl = document.getElementById("editorTitle");
    const editorBackBtnEl = document.getElementById("editorBackBtn");
    const noteTitleInputEl = document.getElementById("noteTitleInput");
    const noteBodyInputEl = document.getElementById("noteBodyInput");
    const editorSaveBtnEl = document.getElementById("editorSaveBtn");
    const editorDeleteBtnEl = document.getElementById("editorDeleteBtn");
    const editorStatusEl = document.getElementById("editorStatus");

    const settingsBackBtnEl = document.getElementById("settingsBackBtn");
    const settingsPinInputEl = document.getElementById("settingsPinInput");
    const settingsSavePinBtnEl = document.getElementById("settingsSavePinBtn");

    // --- Paths ---
    function userNotesPath() {
      return `users/${currentUID}/notes`;
    }
    function userPinPath() {
      return `users/${currentUID}/pin`;
    }

    // --- Notes logic ---
    function wordCount(text) {
      if (!text) return 0;
      return text.trim().split(/\s+/).filter(Boolean).length;
    }

    function renderNotes() {
      const activeNotes = notes;
      statsNotesEl.textContent = "Notes: " + activeNotes.length;
      const totalWords = activeNotes.reduce((sum, n) => sum + wordCount(n.body), 0);
      statsWordsEl.textContent = "Words: " + totalWords;

      notesListEl.innerHTML = "";
      if (!activeNotes.length) {
        notesEmptyEl.style.display = "block";
        return;
      }
      notesEmptyEl.style.display = "none";

      activeNotes
        .slice()
        .sort((a, b) => b.createdAt - a.createdAt)
        .forEach((note) => {
          const item = document.createElement("div");
          item.className = "note-item";
          item.dataset.id = note.id;

          const titleEl = document.createElement("div");
          titleEl.className = "note-item-title";
          titleEl.textContent = note.title || "Untitled";

          const metaEl = document.createElement("div");
          metaEl.className = "note-item-meta";
          const d = new Date(note.createdAt || Date.now());
          metaEl.textContent =
            d.toLocaleDateString() + " • " + wordCount(note.body) + " words";

          const bodyEl = document.createElement("div");
          bodyEl.className = "note-item-body";
          bodyEl.textContent = note.body || "";

          item.appendChild(titleEl);
          item.appendChild(metaEl);
          item.appendChild(bodyEl);

          item.addEventListener("click", () => {
            openEditor(note);
          });

          notesListEl.appendChild(item);
        });
    }

    function attachNotesListener() {
      if (!currentUID) return;
      if (notesRef) notesRef.off();
      notesRef = db.ref(userNotesPath());
      notesRef.on("value", (snap) => {
        const data = snap.val() || {};
        notes = Object.keys(data).map((id) => ({
          id,
          title: data[id].title || "",
          body: data[id].body || "",
          createdAt: data[id].createdAt || Date.now(),
        }));
        renderNotes();
      });
    }

    function openEditor(note) {
      if (note) {
        editingNoteId = note.id;
        editorTitleEl.textContent = "Edit note";
        noteTitleInputEl.value = note.title;
        noteBodyInputEl.value = note.body;
        editorDeleteBtnEl.style.display = "inline-block";
      } else {
        editingNoteId = null;
        editorTitleEl.textContent = "New note";
        noteTitleInputEl.value = "";
        noteBodyInputEl.value = "";
        editorDeleteBtnEl.style.display = "none";
      }
      editorStatusEl.textContent = "Ready";
      showScreen("editor");
    }

    async function saveNote() {
      const title = noteTitleInputEl.value.trim();
      const body = noteBodyInputEl.value.trim();
      if (!title && !body) {
        editorStatusEl.textContent = "Type something first.";
        return;
      }
      editorStatusEl.textContent = "Saving...";
      const payload = {
        title,
        body,
        createdAt: Date.now(),
      };
      try {
        if (editingNoteId) {
          await db.ref(userNotesPath()).child(editingNoteId).update(payload);
        } else {
          await db.ref(userNotesPath()).push(payload);
        }
        editorStatusEl.textContent = "Saved.";
        showToast("Note saved");
        showScreen("home");
      } catch (e) {
        editorStatusEl.textContent = "Error saving.";
        showToast("Error saving note");
      }
    }

    async function deleteNote() {
      if (!editingNoteId) {
        editorStatusEl.textContent = "Nothing to delete.";
        return;
      }
      editorStatusEl.textContent = "Deleting...";
      try {
        await db.ref(userNotesPath()).child(editingNoteId).remove();
        editorStatusEl.textContent = "Deleted.";
        showToast("Note deleted");
        showScreen("home");
      } catch (e) {
        editorStatusEl.textContent = "Error deleting.";
        showToast("Error deleting note");
      }
    }

    // --- PIN logic ---
    async function loadUserPin() {
      if (!currentUID) return;
      const snap = await db.ref(userPinPath()).once("value");
      const pin = snap.val();
      hasPin = !!pin;
      pinLoaded = true;
      if (hasPin) {
        sessionUnlocked = false;
        lockPinInput.value = "";
        lockErrorEl.textContent = "";
        showScreen("lock");
      } else {
        sessionUnlocked = true;
        showScreen("home");
      }
    }

    async function checkPinAndUnlock() {
      if (!currentUID) return;
      const entered = lockPinInput.value.trim();
      if (!entered || entered.length !== 4) {
        lockErrorEl.textContent = "Enter 4 digits.";
        return;
      }
      const snap = await db.ref(userPinPath()).once("value");
      const pin = snap.val();
      if (!pin) {
        // No pin set, just unlock
        sessionUnlocked = true;
        showScreen("home");
        return;
      }
      if (entered === pin) {
        sessionUnlocked = true;
        lockErrorEl.textContent = "";
        lockPinInput.value = "";
        showScreen("home");
      } else {
        lockErrorEl.textContent = "Wrong PIN. Try again.";
      }
    }

    async function saveUserPin() {
      if (!currentUID) return;
      const pin = settingsPinInputEl.value.trim();
      if (pin && (!/^\d{4}$/.test(pin))) {
        showToast("PIN must be 4 digits (0–9).");
        return;
      }
      try {
        if (pin) {
          await db.ref(userPinPath()).set(pin);
          hasPin = true;
          showToast("PIN saved.");
        } else {
          await db.ref(userPinPath()).remove();
          hasPin = false;
          showToast("PIN removed.");
        }
      } catch (e) {
        showToast("Error saving PIN.");
      }
    }

    // --- Auth handlers ---
    loginBtnEl.addEventListener("click", async () => {
      const email = loginEmailEl.value.trim();
      const password = loginPasswordEl.value.trim();
      loginErrorEl.textContent = "";
      if (!email || !password) {
        loginErrorEl.textContent = "Enter email and password.";
        return;
      }
      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch (e) {
        loginErrorEl.textContent = e.message || "Login failed.";
      }
    });

    signupBtnEl.addEventListener("click", async () => {
      const email = signupEmailEl.value.trim();
      const password = signupPasswordEl.value.trim();
      const password2 = signupPassword2El.value.trim();
      signupErrorEl.textContent = "";
      if (!email || !password || !password2) {
        signupErrorEl.textContent = "Fill all fields.";
        return;
      }
      if (password !== password2) {
        signupErrorEl.textContent = "Passwords do not match.";
        return;
      }
      if (password.length < 6) {
        signupErrorEl.textContent = "Password must be at least 6 characters.";
        return;
      }
      try {
        await auth.createUserWithEmailAndPassword(email, password);
      } catch (e) {
        signupErrorEl.textContent = e.message || "Signup failed.";
      }
    });

    goSignupEl.addEventListener("click", () => {
      loginErrorEl.textContent = "";
      showScreen("signup");
    });
    goLoginEl.addEventListener("click", () => {
      signupErrorEl.textContent = "";
      showScreen("login");
    });

    logoutBtnEl.addEventListener("click", async () => {
      try {
        await auth.signOut();
      } catch (e) {
        showToast("Logout failed.");
      }
    });

    // --- Lock events ---
    lockUnlockBtn.addEventListener("click", checkPinAndUnlock);
    lockPinInput.addEventListener("keyup", (e) => {
      if (e.key === "Enter") checkPinAndUnlock();
    });

    // --- Home / editor / settings events ---
    newNoteBtnEl.addEventListener("click", () => openEditor(null));
    editorSaveBtnEl.addEventListener("click", saveNote);
    editorDeleteBtnEl.addEventListener("click", deleteNote);
    editorBackBtnEl.addEventListener("click", () => showScreen("home"));

    settingsBtnEl.addEventListener("click", async () => {
      if (!currentUID) return;
      const snap = await db.ref(userPinPath()).once("value");
      const pin = snap.val() || "";
      settingsPinInputEl.value = pin;
      showScreen("settings");
    });
    settingsBackBtnEl.addEventListener("click", () => showScreen("home"));
    settingsSavePinBtnEl.addEventListener("click", saveUserPin);

    // --- Auth state listener ---
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUID = user.uid;
        notes = [];
        sessionUnlocked = false;
        pinLoaded = false;
        attachNotesListener();
        await loadUserPin(); // decides lock vs home
      } else {
        currentUID = null;
        notes = [];
        if (notesRef) notesRef.off();
        showScreen("login");
      }
    });

    // Initial
    showScreen("login");
  </script>
</body>
</html>
