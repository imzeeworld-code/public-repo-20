<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WOD Notepad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    :root {
      --bg: #020617;
      --bg-card: #020617;
      --bg-soft: #0b1120;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --border: #1f2937;
      --accent: #facc15;
      --accent-soft: rgba(250, 204, 21, 0.15);
      --danger: #f97373;
      --radius-lg: 16px;
      --radius-md: 10px;
      --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.7);
      --font-size-body: 14px;
      --font-size-title: 16px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: #000;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .app-root {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      background: radial-gradient(circle at top, #020617 0, #020617 55%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: var(--text-main);
    }

    .screen {
      flex: 1;
      display: none;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      background: var(--bg);
    }
    .screen.active {
      display: flex;
    }

    h1, h2, h3 {
      margin: 0 0 8px;
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-soft);
    }

    .field {
      display: flex;
      flex-direction: column;
      margin-bottom: 10px;
    }
    .field label {
      font-size: 12px;
      margin-bottom: 4px;
      color: var(--text-muted);
    }
    .field input,
    .field textarea {
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg-soft);
      color: var(--text-main);
      padding: 8px;
      font-size: var(--font-size-body);
      outline: none;
    }
    .field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .btn {
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #020617;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn.secondary {
      background: transparent;
      color: var(--text-main);
      border-color: var(--border);
    }
    .btn.danger {
      background: transparent;
      color: #fecaca;
      border-color: var(--danger);
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .row.space-between {
      justify-content: space-between;
    }

    .error {
      color: #fecaca;
      font-size: 12px;
      min-height: 16px;
      margin-top: 4px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .brand-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .brand-title {
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: var(--font-size-title);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .brand-logo {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .brand-logo svg {
      width: 16px;
      height: 16px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.8;
    }
    .brand-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .icon-btn svg {
      width: 18px;
      height: 18px;
      stroke: var(--text-main);
      fill: none;
      stroke-width: 1.8;
    }

    .pill {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 4px 10px;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-soft);
    }

    .note-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }
    .note-item {
      background: var(--bg-soft);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 10px;
      cursor: pointer;
    }
    .note-item-title {
      font-weight: 600;
      font-size: var(--font-size-body);
      margin-bottom: 4px;
    }
    .note-item-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .note-item-body {
      font-size: var(--font-size-body);
      color: var(--text-main);
      max-height: 48px;
      overflow: hidden;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      background: var(--bg-soft);
      color: var(--text-main);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--border);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease-out, transform 0.2s ease-out;
      z-index: 50;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    .link-text {
      font-size: 12px;
      color: var(--text-muted);
      word-break: break-all;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="app-root">
    <!-- LOGIN -->
    <div id="screen-login" class="screen active">
      <div class="card">
        <h2>Login</h2>
        <div class="field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" autocomplete="email" />
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" autocomplete="current-password" />
        </div>
        <div class="error" id="loginError"></div>
        <button class="btn" id="loginBtn">
          <svg viewBox="0 0 24 24">
            <path d="M5 12h9" />
            <path d="M12 5l7 7-7 7" />
          </svg>
          Login
        </button>
        <button class="btn secondary" id="goSignup">Create account</button>
      </div>
    </div>

    <!-- SIGNUP -->
    <div id="screen-signup" class="screen">
      <div class="card">
        <h2>Sign up</h2>
        <div class="field">
          <label for="signupEmail">Email</label>
          <input id="signupEmail" type="email" autocomplete="email" />
        </div>
        <div class="field">
          <label for="signupPassword">Password</label>
          <input id="signupPassword" type="password" autocomplete="new-password" />
        </div>
        <div class="field">
          <label for="signupPassword2">Confirm password</label>
          <input id="signupPassword2" type="password" autocomplete="new-password" />
        </div>
        <div class="error" id="signupError"></div>
        <button class="btn" id="signupBtn">
          <svg viewBox="0 0 24 24">
            <path d="M12 5v14" />
            <path d="M5 12h14" />
          </svg>
          Create account
        </button>
        <button class="btn secondary" id="goLogin">Back to login</button>
      </div>
    </div>

    <!-- HOME -->
    <div id="screen-home" class="screen">
      <div class="top-bar">
        <div class="brand-block">
          <div class="brand-title">
            <div class="brand-logo">
              <svg viewBox="0 0 24 24">
                <path d="M5 19V5l7 5 7-5v14" />
              </svg>
            </div>
            <span>WOD Notepad</span>
          </div>
          <div class="brand-subtitle">WORLD OF DISCOVERIES</div>
        </div>
        <div class="row">
          <button class="icon-btn" id="settingsBtn" title="Settings">
            <svg viewBox="0 0 24 24">
              <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
          </button>
          <button class="icon-btn" id="logoutBtn" title="Logout">
            <svg viewBox="0 0 24 24">
              <path d="M10 17l-5-5 5-5" />
              <path d="M5 12h11" />
              <path d="M15 5h4v14h-4" />
            </svg>
          </button>
        </div>
      </div>

      <div class="card">
        <div class="row space-between">
          <div class="pill" id="statsNotes">Notes: 0</div>
          <div class="pill" id="statsWords">Words: 0</div>
        </div>
      </div>

      <div class="card">
        <div class="row space-between">
          <h3>Notes</h3>
          <button class="btn" id="newNoteBtn">
            <svg viewBox="0 0 24 24">
              <path d="M12 5v14" />
              <path d="M5 12h14" />
            </svg>
            New
          </button>
        </div>
        <div class="note-list" id="notesList"></div>
        <div id="notesEmpty" style="font-size:13px;color:var(--text-muted);margin-top:8px;">
          No notes yet. Tap “New”.
        </div>
      </div>

      <div class="card">
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;">
          Sharable link
        </div>
        <button class="btn secondary" id="shareLinkBtn">
          <svg viewBox="0 0 24 24">
            <path d="M10 13a5 5 0 0 1 0-7l1.5-1.5a5 5 0 0 1 7 7L17 13" />
            <path d="M14 11a5 5 0 0 1 0 7L12.5 19.5a5 5 0 0 1-7-7L7 11" />
          </svg>
          Copy app link
        </button>
        <div class="link-text" id="shareLinkText"></div>
      </div>
    </div>

    <!-- EDITOR -->
    <div id="screen-editor" class="screen">
      <div class="card">
        <div class="row space-between">
          <h3 id="editorTitle">New note</h3>
          <button class="btn secondary" id="editorBackBtn">
            <svg viewBox="0 0 24 24">
              <path d="M15 18l-6-6 6-6" />
            </svg>
            Back
          </button>
        </div>
        <div class="field">
          <label for="noteTitleInput">Title</label>
          <input id="noteTitleInput" type="text" />
        </div>
        <div class="field">
          <label for="noteBodyInput">Note</label>
          <textarea id="noteBodyInput"></textarea>
        </div>
        <div class="row space-between">
          <button class="btn" id="editorSaveBtn">
            <svg viewBox="0 0 24 24">
              <path d="M5 12h14" />
              <path d="M12 5v14" />
            </svg>
            Save
          </button>
          <button class="btn danger" id="editorDeleteBtn">
            <svg viewBox="0 0 24 24">
              <path d="M4 7h16" />
              <path d="M10 11v6" />
              <path d="M14 11v6" />
              <path d="M6 7l1 12h10l1-12" />
            </svg>
            Delete
          </button>
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:6px;" id="editorStatus">
          Ready
        </div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="screen-settings" class="screen">
      <div class="card">
        <div class="row space-between">
          <h3>Settings</h3>
          <button class="btn secondary" id="settingsBackBtn">
            <svg viewBox="0 0 24 24">
              <path d="M15 18l-6-6 6-6" />
            </svg>
            Back
          </button>
        </div>
        <div style="font-size:13px;color:var(--text-muted);">
          (Reserved for future options)
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // --- Firebase config ---
    const firebaseConfig = {
      apiKey: "AIzaSyBMKrFDt5uvRDjTDDeaRKQQHXNrwc0SAEo",
      authDomain: "let-s-talk-e57c6.firebaseapp.com",
      databaseURL: "https://let-s-talk-e57c6-default-rtdb.firebaseio.com",
      projectId: "let-s-talk-e57c6",
      storageBucket: "let-s-talk-e57c6.firebasestorage.app",
      messagingSenderId: "958080107908",
      appId: "1:958080107908:web:d9b11b958af59bb315c9d1",
      measurementId: "G-QG6K3BNH6G"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUID = null;
    let notes = [];
    let editingNoteId = null;
    let notesRef = null;

    const screens = {
      login: document.getElementById("screen-login"),
      signup: document.getElementById("screen-signup"),
      home: document.getElementById("screen-home"),
      editor: document.getElementById("screen-editor"),
      settings: document.getElementById("screen-settings"),
    };
    let currentScreen = "login";

    function showScreen(name) {
      Object.values(screens).forEach((s) => s.classList.remove("active"));
      screens[name].classList.add("active");
      currentScreen = name;
    }

    const toastEl = document.getElementById("toast");
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 1800);
    }

    const loginEmailEl = document.getElementById("loginEmail");
    const loginPasswordEl = document.getElementById("loginPassword");
    const loginBtnEl = document.getElementById("loginBtn");
    const loginErrorEl = document.getElementById("loginError");
    const goSignupEl = document.getElementById("goSignup");

    const signupEmailEl = document.getElementById("signupEmail");
    const signupPasswordEl = document.getElementById("signupPassword");
    const signupPassword2El = document.getElementById("signupPassword2");
    const signupBtnEl = document.getElementById("signupBtn");
    const signupErrorEl = document.getElementById("signupError");
    const goLoginEl = document.getElementById("goLogin");

    const settingsBtnEl = document.getElementById("settingsBtn");
    const logoutBtnEl = document.getElementById("logoutBtn");
    const newNoteBtnEl = document.getElementById("newNoteBtn");
    const notesListEl = document.getElementById("notesList");
    const notesEmptyEl = document.getElementById("notesEmpty");
    const statsNotesEl = document.getElementById("statsNotes");
    const statsWordsEl = document.getElementById("statsWords");
    const shareLinkBtnEl = document.getElementById("shareLinkBtn");
    const shareLinkTextEl = document.getElementById("shareLinkText");

    const editorTitleEl = document.getElementById("editorTitle");
    const editorBackBtnEl = document.getElementById("editorBackBtn");
    const noteTitleInputEl = document.getElementById("noteTitleInput");
    const noteBodyInputEl = document.getElementById("noteBodyInput");
    const editorSaveBtnEl = document.getElementById("editorSaveBtn");
    const editorDeleteBtnEl = document.getElementById("editorDeleteBtn");
    const editorStatusEl = document.getElementById("editorStatus");

    const settingsBackBtnEl = document.getElementById("settingsBackBtn");

    function userNotesPath() {
      return `users/${currentUID}/notes`;
    }

    function wordCount(text) {
      if (!text) return 0;
      return text.trim().split(/\s+/).filter(Boolean).length;
    }

    function renderNotes() {
      const activeNotes = notes;
      statsNotesEl.textContent = "Notes: " + activeNotes.length;
      const totalWords = activeNotes.reduce((sum, n) => sum + wordCount(n.body), 0);
      statsWordsEl.textContent = "Words: " + totalWords;

      notesListEl.innerHTML = "";
      if (!activeNotes.length) {
        notesEmptyEl.style.display = "block";
        return;
      }
      notesEmptyEl.style.display = "none";

      activeNotes
        .slice()
        .sort((a, b) => b.createdAt - a.createdAt)
        .forEach((note) => {
          const item = document.createElement("div");
          item.className = "note-item";
          item.dataset.id = note.id;

          const titleEl = document.createElement("div");
          titleEl.className = "note-item-title";
          titleEl.textContent = note.title || "Untitled";

          const metaEl = document.createElement("div");
          metaEl.className = "note-item-meta";
          const d = new Date(note.createdAt || Date.now());
          metaEl.textContent =
            d.toLocaleDateString() + " • " + wordCount(note.body) + " words";

          const bodyEl = document.createElement("div");
          bodyEl.className = "note-item-body";
          bodyEl.textContent = note.body || "";

          item.appendChild(titleEl);
          item.appendChild(metaEl);
          item.appendChild(bodyEl);

          item.addEventListener("click", () => {
            openEditor(note);
          });

          notesListEl.appendChild(item);
        });
    }

    function attachNotesListener() {
      if (!currentUID) return;
      if (notesRef) notesRef.off();
      notesRef = db.ref(userNotesPath());
      notesRef.on("value", (snap) => {
        const data = snap.val() || {};
        notes = Object.keys(data).map((id) => ({
          id,
          title: data[id].title || "",
          body: data[id].body || "",
          createdAt: data[id].createdAt || Date.now(),
        }));
        renderNotes();
      });
    }

    function openEditor(note) {
      if (note) {
        editingNoteId = note.id;
        editorTitleEl.textContent = "Edit note";
        noteTitleInputEl.value = note.title;
        noteBodyInputEl.value = note.body;
        editorDeleteBtnEl.style.display = "inline-flex";
      } else {
        editingNoteId = null;
        editorTitleEl.textContent = "New note";
        noteTitleInputEl.value = "";
        noteBodyInputEl.value = "";
        editorDeleteBtnEl.style.display = "none";
      }
      editorStatusEl.textContent = "Ready";
      showScreen("editor");
    }

    async function saveNote() {
      const title = noteTitleInputEl.value.trim();
      const body = noteBodyInputEl.value.trim();
      if (!title && !body) {
        editorStatusEl.textContent = "Type something first.";
        return;
      }
      editorStatusEl.textContent = "Saving...";
      const payload = {
        title,
        body,
        createdAt: Date.now(),
      };
      try {
        if (editingNoteId) {
          await db.ref(userNotesPath()).child(editingNoteId).update(payload);
        } else {
          await db.ref(userNotesPath()).push(payload);
        }
        editorStatusEl.textContent = "Saved.";
        showToast("Note saved");
        showScreen("home");
      } catch (e) {
        editorStatusEl.textContent = "Error saving.";
        showToast("Error saving note");
      }
    }

    async function deleteNote() {
      if (!editingNoteId) {
        editorStatusEl.textContent = "Nothing to delete.";
        return;
      }
      editorStatusEl.textContent = "Deleting...";
      try {
        await db.ref(userNotesPath()).child(editingNoteId).remove();
        editorStatusEl.textContent = "Deleted.";
        showToast("Note deleted");
        showScreen("home");
      } catch (e) {
        editorStatusEl.textContent = "Error deleting.";
        showToast("Error deleting note");
      }
    }

    loginBtnEl.addEventListener("click", async () => {
      const email = loginEmailEl.value.trim();
      const password = loginPasswordEl.value.trim();
      loginErrorEl.textContent = "";
      if (!email || !password) {
        loginErrorEl.textContent = "Enter email and password.";
        return;
      }
      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch (e) {
        loginErrorEl.textContent = e.message || "Login failed.";
      }
    });

    signupBtnEl.addEventListener("click", async () => {
      const email = signupEmailEl.value.trim();
      const password = signupPasswordEl.value.trim();
      const password2 = signupPassword2El.value.trim();
      signupErrorEl.textContent = "";
      if (!email || !password || !password2) {
        signupErrorEl.textContent = "Fill all fields.";
        return;
      }
      if (password !== password2) {
        signupErrorEl.textContent = "Passwords do not match.";
        return;
      }
      if (password.length < 6) {
        signupErrorEl.textContent = "Password must be at least 6 characters.";
        return;
      }
      try {
        await auth.createUserWithEmailAndPassword(email, password);
      } catch (e) {
        signupErrorEl.textContent = e.message || "Signup failed.";
      }
    });

    goSignupEl.addEventListener("click", () => {
      loginErrorEl.textContent = "";
      showScreen("signup");
    });
    goLoginEl.addEventListener("click", () => {
      signupErrorEl.textContent = "";
      showScreen("login");
    });

    logoutBtnEl.addEventListener("click", async () => {
      try {
        await auth.signOut();
      } catch (e) {
        showToast("Logout failed.");
      }
    });

    newNoteBtnEl.addEventListener("click", () => openEditor(null));
    editorSaveBtnEl.addEventListener("click", saveNote);
    editorDeleteBtnEl.addEventListener("click", deleteNote);
    editorBackBtnEl.addEventListener("click", () => showScreen("home"));

    settingsBtnEl.addEventListener("click", () => {
      showScreen("settings");
    });
    settingsBackBtnEl.addEventListener("click", () => showScreen("home"));

    shareLinkBtnEl.addEventListener("click", () => {
      const link = window.location.href;
      shareLinkTextEl.textContent = link;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(link).then(
          () => showToast("Link copied"),
          () => showToast("Copy failed")
        );
      } else {
        showToast("Copy not supported");
      }
    });

    auth.onAuthStateChanged((user) => {
      if (user) {
        currentUID = user.uid;
        notes = [];
        attachNotesListener();
        showScreen("home");
      } else {
        currentUID = null;
        notes = [];
        if (notesRef) notesRef.off();
        showScreen("login");
      }
    });

    showScreen("login");
  </script>
