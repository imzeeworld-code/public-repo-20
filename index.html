<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>public-repo-20</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <!-- Minimal styling for mobile -->
  <style>
    body {
      background: #fcfcfc;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      background: #0d47a1;
      color: #fff;
      padding: 1.2rem;
      box-sizing: border-box;
      text-align: center;
      font-size: 1.7rem;
      letter-spacing: 2px;
    }
    #noteForm {
      display: flex;
      width: 95vw;
      max-width: 500px;
      padding: 1rem 0.6rem 0.3rem 0.6rem;
      box-sizing: border-box;
      gap: 0.6rem;
    }
    #noteInput {
      flex-grow: 1;
      padding: 0.7rem;
      font-size: 1.15rem;
      border: 1px solid #ddd;
      border-radius: 7px;
      outline: none;
    }
    #addBtn{
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 1.15rem;
      padding: 0 1.1rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #addBtn:active{
      background: #1565c0;
    }
    #notesList {
      width: 95vw;
      max-width: 500px;
      margin: 0 auto;
      margin-bottom: 80px;
      padding: 0.5rem;
      box-sizing: border-box;
    }
    .note-item {
      background: #fff;
      margin-bottom: 1rem;
      border-radius: 9px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      padding: 1rem 0.9rem 0.7rem 0.9rem;
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: start;
    }
    .note-content {
      word-break: break-word;
      font-size: 1.11rem;
    }
    .delete-btn {
      background: #ef5350;
      color: #fff;
      border: none;
      padding: .4rem .7rem;
      font-size: 1rem;
      border-radius: 6px;
      margin-left: 1rem;
      cursor: pointer;
      align-self: flex-start;
      transition: background 0.15s;
    }
    .delete-btn:active {
      background: #c62828;
    }
    @media (max-width: 600px){
      header {
        font-size: 1.25rem;
        padding: .85rem;
      }
      #noteInput { font-size: 1rem;}
      #addBtn{ font-size:1rem;}
    }
  </style>
</head>
<body>
  <header>public-repo-20</header>
  <form id="noteForm" autocomplete="off">
    <input type="text" id="noteInput" placeholder="Write your note..." maxlength="200" required />
    <button type="submit" id="addBtn">Add</button>
  </form>
  <div id="notesList"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script>
    // Your Firebase config
    const firebaseConfig = {
      databaseURL: "https://let-s-talk-e57c6-default-rtdb.firebaseio.com/"
    };
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const notesRef = db.ref("notes");

    // DOM
    const notesList = document.getElementById("notesList");
    const noteForm = document.getElementById("noteForm");
    const noteInput = document.getElementById("noteInput");

    // Listen for notes and render
    notesRef.on('value', snapshot => {
      const data = snapshot.val()||{};
      renderNotes(Object.entries(data));
    });

    function renderNotes(notesArr) {
      notesList.innerHTML = "";
      if(notesArr.length === 0){
        notesList.innerHTML = "<div style='color:#888;text-align:center;padding:2rem;'>No notes yet.</div>";
      }
      else{
        // Show most recent at the top
        notesArr.sort((a,b)=> b[1].timestamp - a[1].timestamp);
        for(const [id, note] of notesArr){
          const div = document.createElement("div");
          div.className = "note-item";
          div.innerHTML =
            `<div class="note-content">${escapeHtml(note.text)}</div>
             <button class="delete-btn" data-id="${id}" title="Delete note">✕</button>`;
          notesList.appendChild(div);
        }
      }
      attachDeleteBtnListeners();
    }

    noteForm.addEventListener('submit', e => {
      e.preventDefault();
      const text = noteInput.value.trim();
      if(text.length > 0){
        // Push to database
        notesRef.push({
          text,
          timestamp: Date.now()
        });
        noteInput.value = "";
      }
    });

    function attachDeleteBtnListeners(){
      document.querySelectorAll('.delete-btn').forEach(btn=>{
        btn.onclick = function(){
          const noteId = this.getAttribute('data-id');
          if(confirm('Delete this note?')){
            notesRef.child(noteId).remove();
          }
        };
      });
    }

    // Helper to avoid XSS
    function escapeHtml(text) {
      var div = document.createElement('div');
      div.innerText = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
