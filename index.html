<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>WOD Notepad | World of Discoveries</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter + Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }

        /* ========== THEMES ========== */
        body.light {
            --bg-app: #f8fafc;
            --bg-sidebar: #ffffff;
            --bg-editor: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --card-shadow: 0 1px 3px rgba(0,0,0,0.05);
            --accent: #3b82f6;
            --accent-soft: #eff6ff;
            --hover-bg: #f1f5f9;
            --stat-bg: #f8fafc;
            --fab-bg: #3b82f6;
            --fab-shadow: 0 4px 12px rgba(0,0,0,0.15);
        }
        body.dark {
            --bg-app: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-editor: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --card-shadow: 0 1px 3px rgba(0,0,0,0.3);
            --accent: #60a5fa;
            --accent-soft: #1e293b;
            --hover-bg: #334155;
            --stat-bg: #0f172a;
            --fab-bg: #60a5fa;
        }
        body.green {
            --bg-app: #ecfdf5;
            --bg-sidebar: #ffffff;
            --bg-editor: #ffffff;
            --text-primary: #064e3b;
            --text-secondary: #047857;
            --border: #a7f3d0;
            --accent: #10b981;
            --accent-soft: #d1fae5;
            --hover-bg: #ecfdf5;
            --stat-bg: #f0fdf4;
            --fab-bg: #10b981;
        }
        body.yellow {
            --bg-app: #fefce8;
            --bg-sidebar: #ffffff;
            --bg-editor: #ffffff;
            --text-primary: #713f12;
            --text-secondary: #a16207;
            --border: #fde047;
            --accent: #eab308;
            --accent-soft: #fef9c3;
            --hover-bg: #fefce8;
            --stat-bg: #fffde7;
            --fab-bg: #eab308;
        }

        body {
            background: var(--bg-app);
            color: var(--text-primary);
        }

        /* ========== APP LAYOUT (RESPONSIVE) ========== */
        .app-wrapper {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* LEFT SIDEBAR - desktop style, but collapsible on mobile */
        .sidebar-left {
            width: 300px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
            box-shadow: var(--card-shadow);
            z-index: 2;
            transition: transform 0.3s ease;
        }

        /* Mobile: sidebar hidden by default, toggle with menu */
        @media (max-width: 768px) {
            .sidebar-left {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                width: 85%;
                max-width: 300px;
                transform: translateX(-100%);
                z-index: 1000;
                box-shadow: 2px 0 12px rgba(0,0,0,0.2);
            }
            .sidebar-left.open {
                transform: translateX(0);
            }
            .menu-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.4);
                z-index: 999;
            }
            .menu-overlay.active {
                display: block;
            }
        }

        .logo-area {
            padding: 1.5rem 1.5rem 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .logo-main {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-sub {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .search-box {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .search-box input {
            width: 100%;
            background: var(--bg-app);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            color: var(--text-primary);
            outline: none;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .stat-card {
            background: var(--stat-bg);
            border-radius: 20px;
            padding: 0.75rem 0.5rem;
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-number {
            font-size: 1.5rem;
            font-weight: 800;
        }
        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        .categories {
            padding: 1rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .cat-chip {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 0.3rem 1rem;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .cat-chip.active, .cat-chip:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .smart-toggles {
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            border-bottom: 1px solid var(--border);
        }
        .toggle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .toggle-switch {
            width: 36px;
            height: 20px;
            background: var(--border);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
        }
        .toggle-switch.active {
            background: var(--accent);
        }
        .toggle-switch span {
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-switch.active span {
            left: 17px;
        }
        .notes-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .note-item-side {
            background: var(--bg-editor);
            border-radius: 14px;
            padding: 0.8rem;
            margin-bottom: 0.7rem;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .note-item-side.active {
            border-left: 4px solid var(--accent);
            background: var(--accent-soft);
        }
        .note-title-side {
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }
        /* RIGHT EDITOR PANEL */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: var(--bg-app);
        }
        .editor-toolbar {
            padding: 0.8rem 1rem;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        .tool-icon {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.4rem 0.7rem;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .tool-icon:hover {
            background: var(--accent);
            color: white;
        }
        .note-editor-area {
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .note-title-editor {
            font-size: 1.6rem;
            font-weight: 700;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border);
            padding: 0.5rem 0;
            margin-bottom: 1rem;
            color: var(--text-primary);
            outline: none;
            width: 100%;
        }
        .rich-editor {
            flex: 1;
            background: var(--bg-editor);
            border-radius: 20px;
            padding: 1rem;
            font-size: 1rem;
            line-height: 1.6;
            overflow-y: auto;
            border: 1px solid var(--border);
            outline: none;
        }
        .editor-paper.normal { background: var(--bg-editor); }
        .editor-paper.paper { background: #fef7e0; background-image: radial-gradient(circle at 10px 10px, rgba(0,0,0,0.02) 1px, transparent 1px); background-size: 20px 20px; }
        .editor-paper.lined { background: linear-gradient(#f9f9ff 1px, transparent 1px); background-size: 100% 28px; background-color: #fffef7; }
        .status-footer {
            padding: 0.4rem 1rem;
            background: var(--bg-sidebar);
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
        }
        /* Floating Action Button (pencil) */
        .fab-new-note {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--fab-bg);
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--fab-shadow);
            cursor: pointer;
            z-index: 100;
            border: none;
            color: white;
            font-size: 1.6rem;
            transition: 0.2s;
        }
        .fab-new-note:hover {
            transform: scale(1.05);
        }
        /* Mobile menu button */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 100;
            background: var(--accent);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .editor-toolbar {
                padding-top: 0.8rem;
                padding-left: 3rem;
            }
            .tool-icon span:not(.mobile-hide) {
                display: inline;
            }
        }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 998;
            display: none;
        }
        .connection-badge {
            background: var(--accent);
            color: white;
            border-radius: 20px;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--border); }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body class="light">
    <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="app-wrapper">
        <!-- LEFT SIDEBAR -->
        <div class="sidebar-left" id="sidebar">
            <div class="logo-area">
                <div class="logo-main"><i class="fas fa-feather-alt"></i> WOD Notepad</div>
                <div class="logo-sub">WORLD OF DISCOVERIES</div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search notes...">
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number" id="statNotes">0</div><div class="stat-label">NOTES</div></div>
                <div class="stat-card"><div class="stat-number" id="statPinned">0</div><div class="stat-label">PINNED</div></div>
                <div class="stat-card"><div class="stat-number" id="statWords">0</div><div class="stat-label">WORDS</div></div>
                <div class="stat-card"><div class="stat-number" id="statToday">0</div><div class="stat-label">TODAY</div></div>
            </div>
            <div class="categories" id="categoryList">
                <span class="cat-chip active" data-cat="all">All</span>
                <span class="cat-chip" data-cat="Personal">Personal</span>
                <span class="cat-chip" data-cat="Work">Work</span>
                <span class="cat-chip" data-cat="Ideas">Ideas</span>
                <span class="cat-chip" data-cat="To-Do">To-Do</span>
            </div>
            <div class="smart-toggles">
                <div class="toggle-item"><span><i class="fas fa-magic"></i> Auto Correct</span><div class="toggle-switch active" id="autoCorrectSwitch"><span></span></div></div>
                <div class="toggle-item"><span><i class="fas fa-highlighter"></i> Auto Highlight</span><div class="toggle-switch active" id="autoHighlightSwitch"><span></span></div></div>
            </div>
            <div class="notes-list-container" id="notesList">
                <div style="text-align:center; padding:1rem;"><i class="fas fa-spinner fa-pulse"></i> Loading notes...</div>
            </div>
        </div>

        <!-- RIGHT EDITOR -->
        <div class="editor-panel">
            <div class="editor-toolbar">
                <button class="tool-icon" id="pinNoteBtn"><i class="fas fa-thumbtack"></i> <span>Pin</span></button>
                <button class="tool-icon" id="deleteNoteBtn"><i class="fas fa-trash"></i> <span>Delete</span></button>
                <button class="tool-icon" id="shareNoteBtn"><i class="fas fa-share-alt"></i> <span>Share</span></button>
                <select id="pageStyleSelect" class="tool-icon"><option value="normal">📄 Normal</option><option value="paper">📃 Paper</option><option value="lined">🗞️ Lined</option></select>
                <select id="fontFamilySelect" class="tool-icon"><option value="Inter">Inter</option><option value="Georgia">Georgia</option><option value="Courier New">Courier</option></select>
                <input type="color" id="fontColorPicker" value="#000000" style="width:30px;height:30px;border-radius:6px;">
                <select id="fontSizeSelect" class="tool-icon"><option value="14px">Small</option><option value="16px" selected>Med</option><option value="20px">Large</option></select>
                <button class="tool-icon" id="applyFontBtn"><i class="fas fa-paint-brush"></i> <span>Apply</span></button>
                <button class="tool-icon" id="themeBtn"><i class="fas fa-palette"></i> <span>Themes</span></button>
                <button class="tool-icon" id="aboutBtn"><i class="fas fa-info-circle"></i> <span>About</span></button>
            </div>
            <div class="note-editor-area">
                <input type="text" id="noteTitle" class="note-title-editor" placeholder="Note title...">
                <div id="richEditor" class="rich-editor editor-paper normal" contenteditable="true"></div>
            </div>
            <div class="status-footer">
                <span><i class="fas fa-save"></i> <span id="saveStatus">Ready</span></span>
                <span><i class="fas fa-database"></i> <span id="firebaseStatus" class="connection-badge">Connecting...</span></span>
                <span><i class="fas fa-file-word"></i> <span id="wordCount">0</span> words</span>
            </div>
        </div>
    </div>
    <button class="fab-new-note" id="fabNewNote"><i class="fas fa-pencil-alt"></i></button>

    <script>
        // ----------------------------- FIREBASE INIT -----------------------------
        const firebaseConfig = {
            databaseURL: "https://smart-talks-a045c-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const notesRef = database.ref('notes');

        // Global state
        let allNotes = [];
        let currentNoteId = null;
        let currentCategory = "all";
        let searchQuery = "";
        let autoCorrect = true;
        let autoHighlight = true;
        let saveTimer = null;

        // Helper: plain text
        function getPlainText(html) {
            let div = document.createElement('div');
            div.innerHTML = html;
            return div.innerText || "";
        }

        function countWords(text) {
            return text.trim().split(/\s+/).filter(w => w.length > 0).length;
        }

        function updateStatsAndList() {
            let filtered = [...allNotes];
            if (currentCategory !== "all") filtered = filtered.filter(n => n.category === currentCategory);
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(n => n.title?.toLowerCase().includes(q) || getPlainText(n.content || "").toLowerCase().includes(q));
            }
            const total = allNotes.length;
            const pinned = allNotes.filter(n => n.pinned).length;
            let totalWords = 0;
            let todayCount = 0;
            const todayStr = new Date().toISOString().split('T')[0];
            allNotes.forEach(n => {
                totalWords += countWords(getPlainText(n.content || ""));
                if (n.updatedAt && n.updatedAt.split('T')[0] === todayStr) todayCount++;
            });
            document.getElementById('statNotes').innerText = total;
            document.getElementById('statPinned').innerText = pinned;
            document.getElementById('statWords').innerText = totalWords;
            document.getElementById('statToday').innerText = todayCount;
            if (currentNoteId) {
                const curr = allNotes.find(n => n.id === currentNoteId);
                if (curr) document.getElementById('wordCount').innerText = countWords(getPlainText(curr.content || ""));
            } else document.getElementById('wordCount').innerText = "0";
            // render sidebar list
            const container = document.getElementById('notesList');
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:1rem; color:var(--text-secondary);"><i class="fas fa-star-of-life"></i> No notes found<br><small>Tap ✏️ to create</small></div>';
                return;
            }
            container.innerHTML = filtered.map(note => `
                <div class="note-item-side ${currentNoteId === note.id ? 'active' : ''}" data-id="${note.id}">
                    <div class="note-title-side">
                        <span>${note.pinned ? '📌 ' : ''}${escapeHtml(note.title || 'Untitled')}</span>
                        <span style="font-size:10px;">${note.category || 'General'}</span>
                    </div>
                    <div class="note-preview-side">${escapeHtml(getPlainText(note.content || "").substring(0, 55))}</div>
                </div>
            `).join('');
            document.querySelectorAll('.note-item-side').forEach(el => {
                el.addEventListener('click', () => loadNoteIntoEditor(el.dataset.id));
            });
        }

        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        function loadNoteIntoEditor(noteId) {
            const note = allNotes.find(n => n.id === noteId);
            if (!note) return;
            currentNoteId = note.id;
            document.getElementById('noteTitle').value = note.title || "Untitled";
            document.getElementById('richEditor').innerHTML = note.content || "";
            const style = note.pageStyle || "normal";
            const editorDiv = document.getElementById('richEditor');
            editorDiv.classList.remove('normal', 'paper', 'lined');
            editorDiv.classList.add(style);
            document.getElementById('pageStyleSelect').value = style;
            const pinBtn = document.getElementById('pinNoteBtn');
            pinBtn.innerHTML = note.pinned ? '<i class="fas fa-thumbtack"></i> Unpin' : '<i class="fas fa-thumbtack"></i> Pin';
            updateStatsAndList();
            if (autoHighlight) applyAutoHighlight();
        }

        async function saveCurrentNote() {
            if (!currentNoteId) return;
            const title = document.getElementById('noteTitle').value.trim() || "Untitled";
            const content = document.getElementById('richEditor').innerHTML;
            const pageStyle = document.getElementById('pageStyleSelect').value;
            const existing = allNotes.find(n => n.id === currentNoteId);
            if (!existing) return;
            const updated = { ...existing, title, content, pageStyle, updatedAt: new Date().toISOString() };
            await notesRef.child(currentNoteId).set(updated);
            document.getElementById('saveStatus').innerHTML = '✓ Saved';
            setTimeout(() => { if(document.getElementById('saveStatus')) document.getElementById('saveStatus').innerHTML = 'Auto-save'; }, 1500);
            // Auto rename if title empty-ish
            if (autoCorrect) {
                const plain = getPlainText(content);
                if (plain.length > 4 && title === "Untitled") {
                    let newTitle = plain.substring(0, 45);
                    document.getElementById('noteTitle').value = newTitle;
                    updated.title = newTitle;
                    await notesRef.child(currentNoteId).update({ title: newTitle });
                }
            }
        }

        // Auto Correction (smart logic)
        const corrections = {
            "teh":"the","recieve":"receive","wierd":"weird","seperate":"separate","definately":"definitely",
            "accomodate":"accommodate","occured":"occurred","untill":"until","becuase":"because","calender":"calendar",
            "maintainance":"maintenance","priviledge":"privilege","neccessary":"necessary","goverment":"government",
            "wether":"whether","wich":"which","thier":"their","allignment":"alignment","comittment":"commitment"
        };
        function applyAutoCorrection(element) {
            if (!autoCorrect) return;
            const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
            let changed = false;
            while(walker.nextNode()) {
                let node = walker.currentNode;
                let text = node.textContent;
                let newText = text;
                let parts = text.split(/(\b)/);
                for (let i=0; i<parts.length; i++) {
                    let w = parts[i];
                    let low = w.toLowerCase();
                    if (corrections[low] && w === low) { parts[i] = corrections[low]; changed=true; }
                    else if (corrections[low] && w[0] === w[0].toUpperCase() && w.slice(1).toLowerCase() === low.slice(1)) {
                        let cap = corrections[low];
                        cap = cap.charAt(0).toUpperCase() + cap.slice(1);
                        parts[i] = cap; changed=true;
                    }
                }
                if (changed) newText = parts.join('');
                if (newText !== text) node.textContent = newText;
            }
            if (changed && autoHighlight) applyAutoHighlight();
        }
        function applyAutoHighlight() {
            if (!autoHighlight) return;
            const editor = document.getElementById('richEditor');
            const html = editor.innerHTML;
            const keywords = ['TODO', 'IMPORTANT', 'NOTE:', 'WARNING', 'IDEA', 'FIXME'];
            let newHtml = html;
            keywords.forEach(kw => {
                const regex = new RegExp(`\\b(${kw})\\b`, 'gi');
                newHtml = newHtml.replace(regex, `<mark style="background:#fef08a; color:#0f172a; border-radius:4px; padding:0 2px;">$1</mark>`);
            });
            if (newHtml !== html) {
                const sel = window.getSelection();
                const range = sel && sel.rangeCount ? sel.getRangeAt(0) : null;
                editor.innerHTML = newHtml;
                if (range) try { sel?.removeAllRanges(); sel?.addRange(range); } catch(e) {}
            }
        }
        let correctionTimer = null;
        function onEditorInput() {
            if (autoCorrect) {
                if (correctionTimer) clearTimeout(correctionTimer);
                correctionTimer = setTimeout(() => {
                    applyAutoCorrection(document.getElementById('richEditor'));
                    correctionTimer = null;
                    if (autoHighlight) applyAutoHighlight();
                }, 400);
            } else if (autoHighlight) applyAutoHighlight();
            if (saveTimer) clearTimeout(saveTimer);
            saveTimer = setTimeout(() => saveCurrentNote(), 700);
            if (currentNoteId) updateStatsAndList();
        }

        async function createNewNote() {
            const newId = Date.now() + '-' + Math.random().toString(36);
            const newNote = {
                id: newId,
                title: "Untitled",
                content: "<p>Start writing your discovery...</p>",
                pinned: false,
                category: "Personal",
                pageStyle: "normal",
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            await notesRef.child(newId).set(newNote);
        }

        async function togglePin() {
            if (!currentNoteId) return;
            const note = allNotes.find(n => n.id === currentNoteId);
            if (note) {
                note.pinned = !note.pinned;
                await notesRef.child(currentNoteId).update({ pinned: note.pinned });
                const btn = document.getElementById('pinNoteBtn');
                btn.innerHTML = note.pinned ? '<i class="fas fa-thumbtack"></i> Unpin' : '<i class="fas fa-thumbtack"></i> Pin';
                updateStatsAndList();
            }
        }
        async function deleteCurrent() {
            if (!currentNoteId) return;
            if (confirm("Delete note permanently?")) {
                await notesRef.child(currentNoteId).remove();
            }
        }
        async function shareNote() {
            if (!currentNoteId) return alert("Select a note");
            const note = allNotes.find(n => n.id === currentNoteId);
            const text = `${note.title}\n\n${getPlainText(note.content)}`;
            if (navigator.share) await navigator.share({ title: note.title, text });
            else { navigator.clipboard.writeText(text); alert("Copied to clipboard!"); }
        }
        function applyFont() {
            const font = document.getElementById('fontFamilySelect').value;
            const size = document.getElementById('fontSizeSelect').value;
            const color = document.getElementById('fontColorPicker').value;
            document.execCommand('fontName', false, font);
            document.execCommand('foreColor', false, color);
            const sel = window.getSelection();
            if (!sel.isCollapsed) {
                const span = document.createElement('span');
                span.style.fontSize = size;
                const range = sel.getRangeAt(0);
                range.surroundContents(span);
            }
        }
        let themeIndex = 0;
        const themes = ['light','dark','green','yellow'];
        function cycleTheme() { let next = themes[(themes.indexOf(document.body.className)+1)%4]; document.body.className = next; localStorage.setItem('wod_theme', next); }

        // Firebase realtime listener
        notesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) allNotes = Object.entries(data).map(([id, n]) => ({ id, ...n }));
            else allNotes = [];
            document.getElementById('firebaseStatus').innerHTML = '<i class="fas fa-check-circle"></i> Connected';
            updateStatsAndList();
            if (currentNoteId && !allNotes.find(n => n.id === currentNoteId)) {
                if (allNotes.length) loadNoteIntoEditor(allNotes[0].id);
                else { currentNoteId = null; document.getElementById('noteTitle').value = ''; document.getElementById('richEditor').innerHTML = ''; }
            } else if (!currentNoteId && allNotes.length) loadNoteIntoEditor(allNotes[0].id);
        }, (error) => { document.getElementById('firebaseStatus').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error'; console.error(error); });

        // Event bindings
        document.getElementById('newNoteBtn')?.addEventListener('click', createNewNote);
        document.getElementById('fabNewNote')?.addEventListener('click', createNewNote);
        document.getElementById('pinNoteBtn')?.addEventListener('click', togglePin);
        document.getElementById('deleteNoteBtn')?.addEventListener('click', deleteCurrent);
        document.getElementById('shareNoteBtn')?.addEventListener('click', shareNote);
        document.getElementById('applyFontBtn')?.addEventListener('click', applyFont);
        document.getElementById('themeBtn')?.addEventListener('click', cycleTheme);
        document.getElementById('aboutBtn')?.addEventListener('click', () => alert("WOD Notepad Pro\nPermanent Firebase storage\nAuto-correct | Auto-highlight | Pin | Themes | Paper styles"));
        document.getElementById('pageStyleSelect')?.addEventListener('change', async () => {
            if(currentNoteId) {
                let style = document.getElementById('pageStyleSelect').value;
                document.getElementById('richEditor').classList.remove('normal','paper','lined');
                document.getElementById('richEditor').classList.add(style);
                await notesRef.child(currentNoteId).update({ pageStyle: style });
            }
        });
        document.getElementById('searchInput')?.addEventListener('input', (e) => { searchQuery = e.target.value; updateStatsAndList(); });
        document.querySelectorAll('.cat-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentCategory = chip.dataset.cat;
                updateStatsAndList();
            });
        });
        document.getElementById('autoCorrectSwitch')?.addEventListener('click', function() { autoCorrect = !autoCorrect; this.classList.toggle('active'); });
        document.getElementById('autoHighlightSwitch')?.addEventListener('click', function() { autoHighlight = !autoHighlight; this.classList.toggle('active'); if(autoHighlight) applyAutoHighlight(); });
        document.getElementById('richEditor')?.addEventListener('input', onEditorInput);
        document.getElementById('noteTitle')?.addEventListener('input', () => { if(saveTimer) clearTimeout(saveTimer); saveTimer = setTimeout(() => saveCurrentNote(), 500); });
        // Mobile sidebar
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('menuOverlay');
        document.getElementById('mobileMenuBtn')?.addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('active'); });
        overlay?.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); });
        // restore theme
        let savedTheme = localStorage.getItem('wod_theme');
        if (savedTheme && themes.includes(savedTheme)) document.body.className = savedTheme;
        else document.body.className = 'light';
    </script>
</body>
</html>
