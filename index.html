<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WOD Notepad | The Ultimate Professional Notepad</title>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter for clean modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            height: 100vh;
            overflow: hidden;
        }

        /* Theme definitions */
        body.light {
            --bg-main: #f1f5f9;
            --bg-sidebar: #ffffff;
            --bg-editor: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --border: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }
        body.dark {
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-editor: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            --accent: #60a5fa;
            --accent-hover: #3b82f6;
        }
        body.green {
            --bg-main: #eef5ec;
            --bg-sidebar: #f4faf2;
            --bg-editor: #ffffff;
            --text-primary: #14532d;
            --text-secondary: #166534;
            --border: #bbf7d0;
            --accent: #22c55e;
            --accent-hover: #16a34a;
        }
        body.yellow {
            --bg-main: #fefce8;
            --bg-sidebar: #fffde7;
            --bg-editor: #ffffff;
            --text-primary: #713f12;
            --text-secondary: #854d0e;
            --border: #fde047;
            --accent: #eab308;
            --accent-hover: #ca8a04;
        }

        /* Paper styles (Page, 📃 paper, normal) */
        .editor-paper.normal {
            background: var(--bg-editor);
        }
        .editor-paper.paper {
            background: #fef7e0;
            background-image: radial-gradient(circle at 10px 10px, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #3b2e1e;
        }
        .editor-paper.lined {
            background: linear-gradient(#f9f9ff 1px, transparent 1px);
            background-size: 100% 28px;
            background-color: #fffef7;
        }

        body, .app-container {
            height: 100%;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* Top toolbar */
        .toolbar {
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem;
            box-shadow: var(--card-shadow);
            z-index: 10;
        }
        .logo {
            font-weight: 800;
            font-size: 1.4rem;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-right: 1rem;
        }
        .tool-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .tool-btn i { font-size: 0.9rem; }
        .tool-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        select, input, .color-input {
            background: var(--bg-editor);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.4rem 0.6rem;
            font-size: 0.8rem;
            color: var(--text-primary);
        }
        .main-row {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* Sidebar notes list */
        .sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .note-item {
            background: var(--bg-editor);
            border-radius: 12px;
            padding: 0.75rem;
            margin-bottom: 0.6rem;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .note-item.active {
            border-left: 5px solid var(--accent);
            background: var(--bg-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .note-info {
            flex: 1;
            overflow: hidden;
        }
        .note-title {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .note-preview {
            font-size: 0.7rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
        }
        .note-actions {
            display: flex;
            gap: 6px;
        }
        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-secondary);
            padding: 4px;
            border-radius: 6px;
        }
        .icon-btn:hover { background: var(--border); color: var(--accent); }
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            overflow-y: auto;
            background: var(--bg-main);
        }
        .note-title-input {
            font-size: 1.8rem;
            font-weight: 700;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border);
            width: 100%;
            margin-bottom: 1rem;
            padding: 0.5rem 0;
            color: var(--text-primary);
            outline: none;
        }
        .rich-editor {
            flex: 1;
            background: var(--bg-editor);
            border-radius: 20px;
            padding: 1.2rem;
            font-size: 1rem;
            line-height: 1.6;
            overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
            outline: none;
        }
        .rich-editor:focus {
            border-color: var(--accent);
        }
        .status-bar {
            font-size: 0.7rem;
            padding: 0.5rem 1rem;
            background: var(--bg-sidebar);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        .badge {
            background: var(--accent);
            color: white;
            border-radius: 20px;
            padding: 0.1rem 0.5rem;
            font-size: 0.7rem;
        }
        @media (max-width: 680px) {
            .sidebar { width: 260px; }
            .tool-btn span { display: none; }
            .tool-btn i { margin: 0; }
        }
    </style>
</head>
<body class="light">
<div class="app-container">
    <div class="toolbar">
        <div class="logo"><i class="fas fa-feather-alt"></i> WOD Notepad</div>
        <div style="flex:1"></div>
        <!-- Theme switcher -->
        <button class="tool-btn" id="themeLight"><i class="fas fa-sun"></i><span>Light</span></button>
        <button class="tool-btn" id="themeDark"><i class="fas fa-moon"></i><span>Dark</span></button>
        <button class="tool-btn" id="themeGreen"><i class="fas fa-leaf"></i><span>Green</span></button>
        <button class="tool-btn" id="themeYellow"><i class="fas fa-star"></i><span>Yellow</span></button>
        <!-- Font controls -->
        <select id="fontFamilySelect"><option value="Inter">Inter</option><option value="Georgia">Georgia</option><option value="Courier New">Courier New</option><option value="Arial">Arial</option></select>
        <input type="color" id="fontColorPicker" value="#000000">
        <select id="fontSizeSelect"><option value="14px">Small</option><option value="16px" selected>Medium</option><option value="20px">Large</option><option value="26px">Huge</option></select>
        <button class="tool-btn" id="applyFormatBtn"><i class="fas fa-paint-brush"></i><span>Apply</span></button>
        <button class="tool-btn" id="aboutBtn"><i class="fas fa-info-circle"></i><span>About</span></button>
    </div>
    <div class="main-row">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-sticky-note"></i> Notes</h3>
                <button class="tool-btn" id="newNoteBtn"><i class="fas fa-plus"></i> New</button>
            </div>
            <div class="notes-list" id="notesListContainer">
                <!-- dynamic notes -->
            </div>
            <div style="padding: 0.8rem; border-top:1px solid var(--border);">
                <button class="tool-btn" id="refreshNotesBtn" style="width:100%"><i class="fas fa-sync-alt"></i> Sync</button>
            </div>
        </div>
        <!-- Editor -->
        <div class="editor-area">
            <input type="text" id="noteTitleInput" class="note-title-input" placeholder="Note title...">
            <div class="editor-panel">
                <div style="display: flex; gap: 8px; margin-bottom: 12px; flex-wrap:wrap;">
                    <select id="pageStyleSelect">
                        <option value="normal">📄 Normal Page</option>
                        <option value="paper">📃 Paper Vintage</option>
                        <option value="lined">🗞️ Lined Paper</option>
                    </select>
                    <button class="tool-btn" id="pinNoteBtn"><i class="fas fa-thumbtack"></i> Pin/Unpin</button>
                    <button class="tool-btn" id="deleteNoteBtn"><i class="fas fa-trash-alt"></i> Delete</button>
                    <button class="tool-btn" id="shareNoteBtn"><i class="fas fa-share-alt"></i> Share</button>
                    <label style="display:flex; align-items:center; gap:5px; background:var(--bg-sidebar); padding:0 8px; border-radius:20px;">
                        <i class="fas fa-magic"></i> AutoCorrect
                        <input type="checkbox" id="autoCorrectToggle" checked>
                    </label>
                    <label style="display:flex; align-items:center; gap:5px; background:var(--bg-sidebar); padding:0 8px; border-radius:20px;">
                        <i class="fas fa-rename"></i> Auto Rename
                        <input type="checkbox" id="autoRenameToggle" checked>
                    </label>
                </div>
                <div id="richEditor" class="rich-editor editor-paper normal" contenteditable="true"></div>
            </div>
        </div>
    </div>
    <div class="status-bar">
        <span><i class="fas fa-save"></i> <span id="autoSaveStatus">Auto-saved</span></span>
        <span><i class="fas fa-database"></i> Firebase Real-time | <span id="noteCount">0</span> notes</span>
    </div>
</div>

<script>
    // ----------------------------- FIREBASE REST API (Realtime DB) -------------------------
    const DB_URL = "https://smart-talks-a045c-default-rtdb.firebaseio.com/notes.json";
    let currentNoteId = null;
    let allNotes = [];       // array of note objects
    let autoSaveTimer = null;
    let autoCorrectEnabled = true;
    let autoRenameEnabled = true;

    // Helper: fetch all notes
    async function fetchAllNotes() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if (!data) {
                allNotes = [];
            } else {
                allNotes = Object.entries(data).map(([id, note]) => ({ id, ...note }));
            }
            // sort: pinned first, then updated desc
            allNotes.sort((a,b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || new Date(b.updatedAt) - new Date(a.updatedAt));
            renderNotesList();
            document.getElementById('noteCount').innerText = allNotes.length;
            return allNotes;
        } catch(e) { console.error(e); return []; }
    }

    async function saveNoteToDB(noteObj) {
        if (!noteObj.id) {
            // create new
            const newId = Date.now() + '-' + Math.random().toString(36);
            noteObj.id = newId;
            noteObj.createdAt = new Date().toISOString();
            noteObj.updatedAt = new Date().toISOString();
            noteObj.pinned = noteObj.pinned || false;
            noteObj.pageStyle = noteObj.pageStyle || "normal";
            const url = `https://smart-talks-a045c-default-rtdb.firebaseio.com/notes/${newId}.json`;
            await fetch(url, { method: 'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(noteObj) });
            await fetchAllNotes();
            return newId;
        } else {
            // update existing
            noteObj.updatedAt = new Date().toISOString();
            const url = `https://smart-talks-a045c-default-rtdb.firebaseio.com/notes/${noteObj.id}.json`;
            await fetch(url, { method: 'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(noteObj) });
            await fetchAllNotes();
            return noteObj.id;
        }
    }

    async function deleteNoteFromDB(noteId) {
        const url = `https://smart-talks-a045c-default-rtdb.firebaseio.com/notes/${noteId}.json`;
        await fetch(url, { method: 'DELETE' });
        await fetchAllNotes();
        if (currentNoteId === noteId) {
            if (allNotes.length > 0) loadNoteIntoEditor(allNotes[0].id);
            else clearEditor();
        }
    }

    // Editor helpers
    function clearEditor() {
        document.getElementById('noteTitleInput').value = '';
        document.getElementById('richEditor').innerHTML = '';
        currentNoteId = null;
    }

    function loadNoteIntoEditor(noteId) {
        const note = allNotes.find(n => n.id === noteId);
        if (!note) return;
        currentNoteId = note.id;
        document.getElementById('noteTitleInput').value = note.title || "Untitled";
        document.getElementById('richEditor').innerHTML = note.content || "";
        // set page style class
        const editorDiv = document.getElementById('richEditor');
        editorDiv.classList.remove('normal', 'paper', 'lined');
        editorDiv.classList.add(note.pageStyle || 'normal');
        document.getElementById('pageStyleSelect').value = note.pageStyle || 'normal';
        updatePinButtonUI(note.pinned);
        highlightActiveNote();
    }

    function highlightActiveNote() {
        document.querySelectorAll('.note-item').forEach(el => {
            if(el.dataset.id === currentNoteId) el.classList.add('active');
            else el.classList.remove('active');
        });
    }

    function updatePinButtonUI(pinned) {
        const pinBtn = document.getElementById('pinNoteBtn');
        if(pinned) pinBtn.innerHTML = '<i class="fas fa-thumbtack"></i> Unpin';
        else pinBtn.innerHTML = '<i class="fas fa-thumbtack"></i> Pin';
    }

    async function autoSaveCurrent() {
        if (!currentNoteId) return;
        const title = document.getElementById('noteTitleInput').value.trim();
        const content = document.getElementById('richEditor').innerHTML;
        const pageStyle = document.getElementById('pageStyleSelect').value;
        const existing = allNotes.find(n => n.id === currentNoteId);
        if (!existing) return;
        const pinned = existing.pinned || false;
        const updatedNote = {
            id: currentNoteId,
            title: title || "Untitled",
            content: content,
            pinned: pinned,
            pageStyle: pageStyle,
            createdAt: existing.createdAt,
            updatedAt: new Date().toISOString()
        };
        await saveNoteToDB(updatedNote);
        document.getElementById('autoSaveStatus').innerHTML = '✓ Saved at ' + new Date().toLocaleTimeString();
        setTimeout(() => { if(document.getElementById('autoSaveStatus')) document.getElementById('autoSaveStatus').innerHTML = 'Auto-save active'; }, 1800);
        // Auto rename logic (if enabled and title is default or empty)
        if(autoRenameEnabled) {
            const plainText = extractPlainText(content);
            let newTitle = plainText.substring(0, 42).trim();
            if(newTitle.length === 0) newTitle = "Untitled";
            if(document.getElementById('noteTitleInput').value.trim() !== newTitle && newTitle !== "Untitled") {
                document.getElementById('noteTitleInput').value = newTitle;
                // re-save with new title
                const freshNote = allNotes.find(n => n.id === currentNoteId);
                if(freshNote) {
                    freshNote.title = newTitle;
                    await saveNoteToDB(freshNote);
                }
            }
        }
        await fetchAllNotes(); // refresh list
    }

    function extractPlainText(html) {
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        return tmp.innerText || "";
    }

    // ---- Auto Correction engine (smart logic, no AI) ----
    const correctionMap = {
        "teh":"the","recieve":"receive","wierd":"weird","seperate":"separate","definately":"definitely",
        "accomodate":"accommodate","occured":"occurred","untill":"until","becuase":"because","calender":"calendar",
        "maintainance":"maintenance","priviledge":"privilege","neccessary":"necessary","goverment":"government",
        "wether":"whether","wich":"which","thier":"their","allignment":"alignment","comittment":"commitment"
    };
    function applyAutoCorrectionToElement(element) {
        if (!autoCorrectEnabled) return;
        const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
        const nodesToModify = [];
        while(walker.nextNode()) {
            const node = walker.currentNode;
            if(node.parentElement && node.parentElement.closest('[contenteditable="true"]') && node.textContent.trim().length > 0) {
                nodesToModify.push(node);
            }
        }
        let changed = false;
        for(let node of nodesToModify) {
            let text = node.textContent;
            let newText = text;
            const words = text.split(/(\b)/);
            for(let i=0; i<words.length; i++) {
                const word = words[i];
                const lowerWord = word.toLowerCase();
                if(correctionMap[lowerWord] && word === lowerWord) {
                    words[i] = correctionMap[lowerWord];
                    changed = true;
                } else if(correctionMap[lowerWord] && word[0] === word[0].toUpperCase() && word.slice(1).toLowerCase() === lowerWord.slice(1)) {
                    let corrected = correctionMap[lowerWord];
                    corrected = corrected.charAt(0).toUpperCase() + corrected.slice(1);
                    words[i] = corrected;
                    changed = true;
                }
            }
            if(changed) newText = words.join('');
            if(newText !== text) node.textContent = newText;
        }
        if(changed) {
            // preserve cursor later
            const sel = window.getSelection();
            const range = sel && sel.rangeCount ? sel.getRangeAt(0) : null;
            if(range) {
                const offset = range.startOffset;
                setTimeout(() => {
                    try { sel.collapse(range.startContainer, Math.min(offset, range.startContainer.length)); } catch(e) {}
                }, 10);
            }
        }
    }

    let correctionTimer = null;
    function onEditorInput() {
        if(autoCorrectEnabled) {
            if(correctionTimer) clearTimeout(correctionTimer);
            correctionTimer = setTimeout(() => {
                const editor = document.getElementById('richEditor');
                applyAutoCorrectionToElement(editor);
                correctionTimer = null;
            }, 400);
        }
        if(autoSaveTimer) clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(() => autoSaveCurrent(), 800);
    }

    // Render notes list with pin, delete, edit support
    function renderNotesList() {
        const container = document.getElementById('notesListContainer');
        if(!container) return;
        container.innerHTML = '';
        for(let note of allNotes) {
            const div = document.createElement('div');
            div.className = 'note-item';
            if(currentNoteId === note.id) div.classList.add('active');
            div.dataset.id = note.id;
            const preview = extractPlainText(note.content || '').substring(0, 50);
            div.innerHTML = `
                <div class="note-info">
                    <div class="note-title">${note.pinned ? '📌 ' : ''}${escapeHtml(note.title || 'Untitled')}</div>
                    <div class="note-preview">${escapeHtml(preview) || 'Empty note'}</div>
                </div>
                <div class="note-actions">
                    <button class="icon-btn pin-note" data-id="${note.id}" title="Pin"><i class="fas fa-thumbtack"></i></button>
                    <button class="icon-btn delete-note" data-id="${note.id}" title="Delete"><i class="fas fa-trash"></i></button>
                </div>
            `;
            div.addEventListener('click', (e) => {
                if(e.target.closest('.pin-note') || e.target.closest('.delete-note')) return;
                loadNoteIntoEditor(note.id);
            });
            container.appendChild(div);
        }
        // attach pin/delete events
        document.querySelectorAll('.pin-note').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                const note = allNotes.find(n => n.id === id);
                if(note) {
                    note.pinned = !note.pinned;
                    await saveNoteToDB(note);
                    await fetchAllNotes();
                    if(currentNoteId === id) updatePinButtonUI(note.pinned);
                }
            });
        });
        document.querySelectorAll('.delete-note').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                if(confirm('Delete this note permanently?')) {
                    await deleteNoteFromDB(btn.dataset.id);
                }
            });
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // New note creation
    async function createNewNote() {
        const newNote = {
            title: "Untitled",
            content: "<p>Start writing your powerful ideas...</p>",
            pinned: false,
            pageStyle: "normal",
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
        };
        const newId = Date.now() + '-' + Math.random().toString(36);
        newNote.id = newId;
        const url = `https://smart-talks-a045c-default-rtdb.firebaseio.com/notes/${newId}.json`;
        await fetch(url, { method: 'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(newNote) });
        await fetchAllNotes();
        loadNoteIntoEditor(newId);
    }

    // Share current note
    async function shareCurrentNote() {
        if(!currentNoteId) return alert('No note selected');
        const note = allNotes.find(n=> n.id === currentNoteId);
        if(!note) return;
        const shareText = `${note.title}\n\n${extractPlainText(note.content)}`;
        if(navigator.share) {
            try{ await navigator.share({ title: note.title, text: shareText }); } catch(e){}
        } else {
            navigator.clipboard.writeText(shareText);
            alert('Note content copied to clipboard!');
        }
    }

    // Apply font styles to selection
    function applyFontStyles() {
        const fontFamily = document.getElementById('fontFamilySelect').value;
        const fontSize = document.getElementById('fontSizeSelect').value;
        const fontColor = document.getElementById('fontColorPicker').value;
        document.execCommand('fontName', false, fontFamily);
        document.execCommand('fontSize', false, '4'); // temp then override? Use style
        document.execCommand('foreColor', false, fontColor);
        // fontSize using execcommand size is limited; we use span approach additional
        const selection = window.getSelection();
        if(!selection.isCollapsed) {
            const span = document.createElement('span');
            span.style.fontSize = fontSize;
            const range = selection.getRangeAt(0);
            range.surroundContents(span);
        } else {
            document.execCommand('styleWithCSS', false, true);
            document.execCommand('fontSize', false, '5');
        }
    }

    // Page style change
    document.getElementById('pageStyleSelect')?.addEventListener('change', async (e) => {
        if(currentNoteId) {
            const note = allNotes.find(n=> n.id === currentNoteId);
            if(note) {
                note.pageStyle = e.target.value;
                await saveNoteToDB(note);
                const editorDiv = document.getElementById('richEditor');
                editorDiv.classList.remove('normal','paper','lined');
                editorDiv.classList.add(note.pageStyle);
            }
        }
    });

    document.getElementById('pinNoteBtn')?.addEventListener('click', async () => {
        if(currentNoteId) {
            const note = allNotes.find(n=> n.id === currentNoteId);
            if(note) {
                note.pinned = !note.pinned;
                await saveNoteToDB(note);
                await fetchAllNotes();
                updatePinButtonUI(note.pinned);
                highlightActiveNote();
            }
        }
    });
    document.getElementById('deleteNoteBtn')?.addEventListener('click', async () => {
        if(currentNoteId && confirm('Permanently delete this note?')) {
            await deleteNoteFromDB(currentNoteId);
        }
    });
    document.getElementById('shareNoteBtn')?.addEventListener('click', shareCurrentNote);
    document.getElementById('applyFormatBtn')?.addEventListener('click', applyFontStyles);
    document.getElementById('newNoteBtn')?.addEventListener('click', createNewNote);
    document.getElementById('refreshNotesBtn')?.addEventListener('click', async () => { await fetchAllNotes(); if(currentNoteId) loadNoteIntoEditor(currentNoteId); });
    document.getElementById('autoCorrectToggle')?.addEventListener('change', (e) => { autoCorrectEnabled = e.target.checked; });
    document.getElementById('autoRenameToggle')?.addEventListener('change', (e) => { autoRenameEnabled = e.target.checked; });
    document.getElementById('aboutBtn')?.addEventListener('click', () => { alert("⚡ WOD Notepad Pro ⚡\nUltimate notepad with permanent Firebase storage, auto-correction, rich styles, pinning, paper styles, auto-save, auto-rename, themes, and unmatched professional power."); });

    // Theme switching
    document.getElementById('themeLight')?.addEventListener('click',()=>{ document.body.className='light'; localStorage.setItem('wod_theme','light');});
    document.getElementById('themeDark')?.addEventListener('click',()=>{ document.body.className='dark'; localStorage.setItem('wod_theme','dark');});
    document.getElementById('themeGreen')?.addEventListener('click',()=>{ document.body.className='green'; localStorage.setItem('wod_theme','green');});
    document.getElementById('themeYellow')?.addEventListener('click',()=>{ document.body.className='yellow'; localStorage.setItem('wod_theme','yellow');});
    const savedTheme = localStorage.getItem('wod_theme');
    if(savedTheme && ['light','dark','green','yellow'].includes(savedTheme)) document.body.className = savedTheme;

    // event listeners
    const editorDiv = document.getElementById('richEditor');
    editorDiv.addEventListener('input', onEditorInput);
    document.getElementById('noteTitleInput').addEventListener('input', () => { if(autoSaveTimer) clearTimeout(autoSaveTimer); autoSaveTimer = setTimeout(()=>autoSaveCurrent(),500); });

    // initial load
    window.addEventListener('DOMContentLoaded', async () => {
        await fetchAllNotes();
        if(allNotes.length > 0) loadNoteIntoEditor(allNotes[0].id);
        else await createNewNote();
    });
</script>
</body>
</html>
